<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ATIRF Architecture Social Graphic</title>
  <desc id="desc">Presentation and social-friendly architecture view of the ATIRF cyber defense platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06101b"/>
      <stop offset="100%" stop-color="#0d2134"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12283d"/>
      <stop offset="100%" stop-color="#17354d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#30d7ff"/>
      <stop offset="100%" stop-color="#35f0bf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020d16" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#56dcff"/>
    </marker>
    <style>
      .title { font: 800 40px 'DejaVu Sans', Arial, sans-serif; fill: #f3fbff; }
      .subtitle { font: 500 18px 'DejaVu Sans', Arial, sans-serif; fill: #bbd7e7; }
      .heading { font: 700 22px 'DejaVu Sans', Arial, sans-serif; fill: #f3fbff; }
      .label { font: 700 17px 'DejaVu Sans', Arial, sans-serif; fill: #eef8ff; }
      .body { font: 500 14px 'DejaVu Sans', Arial, sans-serif; fill: #c7dceb; }
      .small { font: 500 12px 'DejaVu Sans', Arial, sans-serif; fill: #9ec3d8; }
      .box { fill: url(#card); stroke: #2c5774; stroke-width: 2; rx: 24; filter: url(#shadow); }
      .chip { fill: #0d1e2f; stroke: #2e6686; stroke-width: 1.5; rx: 12; }
      .flow { stroke: #56dcff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .accent { stroke: url(#accent); stroke-width: 5; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="60" y="78" class="title">ATIRF</text>
  <text x="60" y="112" class="subtitle">Open cyber defense operating layer for ATT&amp;CK mapping, CTI, ransomware intelligence, NIST-aligned response, and local AI reasoning.</text>
  <line x1="60" y1="138" x2="1540" y2="138" class="accent"/>

  <rect x="60" y="190" width="300" height="520" class="box"/>
  <text x="88" y="230" class="heading">1. Inputs</text>
  <rect x="86" y="256" width="248" height="86" class="chip"/>
  <text x="106" y="288" class="label">Security Telemetry</text>
  <text x="106" y="312" class="body">XDR, SIEM, DNS, proxy,</text>
  <text x="106" y="332" class="body">email, identity, cloud</text>
  <rect x="86" y="364" width="248" height="86" class="chip"/>
  <text x="106" y="396" class="label">Threat Intel</text>
  <text x="106" y="420" class="body">ATT&amp;CK, MISP, OpenCTI,</text>
  <text x="106" y="440" class="body">KEV, ransomware.live</text>
  <rect x="86" y="472" width="248" height="86" class="chip"/>
  <text x="106" y="504" class="label">Local Imports</text>
  <text x="106" y="528" class="body">JSON, STIX, case exports,</text>
  <text x="106" y="548" class="body">offline replay datasets</text>
  <rect x="86" y="580" width="248" height="104" class="chip"/>
  <text x="106" y="612" class="label">Analyst Context</text>
  <text x="106" y="636" class="body">watchlists, asset criticality,</text>
  <text x="106" y="656" class="body">notes, evidence, business risk</text>

  <rect x="420" y="190" width="340" height="520" class="box"/>
  <text x="448" y="230" class="heading">2. Core Platform</text>
  <rect x="446" y="256" width="288" height="90" class="chip"/>
  <text x="466" y="288" class="label">Connector and Import Layer</text>
  <text x="466" y="312" class="body">sync jobs, source health, local</text>
  <text x="466" y="332" class="body">file import, user-managed feeds</text>
  <rect x="446" y="366" width="288" height="90" class="chip"/>
  <text x="466" y="398" class="label">Normalization and Storage</text>
  <text x="466" y="422" class="body">canonical events, enrichment,</text>
  <text x="466" y="442" class="body">SQLite now, prod upgrade path</text>
  <rect x="446" y="476" width="288" height="90" class="chip"/>
  <text x="466" y="508" class="label">Detection and Correlation</text>
  <text x="466" y="532" class="body">alerts, incidents, timelines,</text>
  <text x="466" y="552" class="body">entity links, scoring</text>
  <rect x="446" y="586" width="288" height="98" class="chip"/>
  <text x="466" y="618" class="label">CTI and ATT&amp;CK Knowledge</text>
  <text x="466" y="642" class="body">techniques, ransomware patterns,</text>
  <text x="466" y="662" class="body">KEV, cyber news, source catalog</text>

  <rect x="820" y="190" width="340" height="520" class="box"/>
  <text x="848" y="230" class="heading">3. Reasoning Layer</text>
  <rect x="846" y="256" width="288" height="90" class="chip"/>
  <text x="866" y="288" class="label">Attack Hypotheses</text>
  <text x="866" y="312" class="body">rank likely attack patterns,</text>
  <text x="866" y="332" class="body">map ATT&amp;CK chains and evidence</text>
  <rect x="846" y="366" width="288" height="90" class="chip"/>
  <text x="866" y="398" class="label">Decision Support</text>
  <text x="866" y="422" class="body">playbooks, severity, confidence,</text>
  <text x="866" y="442" class="body">NIST phase and containment choices</text>
  <rect x="846" y="476" width="288" height="90" class="chip"/>
  <text x="866" y="508" class="label">Local AI Copilot</text>
  <text x="866" y="532" class="body">Ollama-powered grounded incident</text>
  <text x="866" y="552" class="body">analysis and analyst guidance</text>
  <rect x="846" y="586" width="288" height="98" class="chip"/>
  <text x="866" y="618" class="label">Analyst Feedback Loop</text>
  <text x="866" y="642" class="body">notes, tasks, evidence, workflow</text>
  <text x="866" y="662" class="body">updates, future tuning path</text>

  <rect x="1220" y="190" width="320" height="520" class="box"/>
  <text x="1248" y="230" class="heading">4. Outcomes</text>
  <rect x="1246" y="256" width="268" height="86" class="chip"/>
  <text x="1266" y="288" class="label">SOC and IR Teams</text>
  <text x="1266" y="312" class="body">triage, contain, document, escalate</text>
  <rect x="1246" y="364" width="268" height="86" class="chip"/>
  <text x="1266" y="396" class="label">CTI and Research Teams</text>
  <text x="1266" y="420" class="body">track campaigns, ransomware, KEV</text>
  <rect x="1246" y="472" width="268" height="86" class="chip"/>
  <text x="1266" y="504" class="label">Detection Engineers</text>
  <text x="1266" y="528" class="body">validate mappings and improve logic</text>
  <rect x="1246" y="580" width="268" height="104" class="chip"/>
  <text x="1266" y="612" class="label">Open Community + Product Path</text>
  <text x="1266" y="636" class="body">open core for trust, premium path</text>
  <text x="1266" y="656" class="body">for managed and multi-tenant ops</text>

  <path d="M360 450 C390 450, 390 450, 420 450" class="flow"/>
  <path d="M760 450 C790 450, 790 450, 820 450" class="flow"/>
  <path d="M1160 450 C1190 450, 1190 450, 1220 450" class="flow"/>

  <path d="M1380 720 C1380 790, 920 820, 590 820 C300 820, 210 780, 210 710" class="flow"/>
  <text x="800" y="780" text-anchor="middle" class="subtitle">Feedback from analysts improves decisions, content, playbooks, and the community knowledge base.</text>

  <rect x="60" y="790" width="1480" height="70" class="chip"/>
  <text x="88" y="832" class="body">Deployment modes: local lab, self-hosted SOC, CTI research workspace, and future hosted control plane with grounded local-first AI.</text>
</svg>
